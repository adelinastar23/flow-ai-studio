<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flow AI Studio</title>

<style>

body {
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    padding:40px;
}

h1 {
    text-align:center;
    color:#a78bfa;
    font-size:42px;
}

.box {
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
}

textarea {
    width:100%;
    height:120px;
    border-radius:10px;
    border:none;
    padding:15px;
    font-size:16px;
    box-sizing:border-box;
}

select {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button {
    width:100%;
    padding:18px;
    background:#8b5cf6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
}

</style>

</head>


<body>

<div class="container">

<h1>🎬 Flow AI Studio</h1>

<div class="box">

<h2>Beschreibe dein Video</h2>

<textarea placeholder="Beispiel:
Ein realistischer Wolf läuft durch einen verschneiten Wald bei Sonnenuntergang"></textarea>

</div>


<div class="box">

<h2>Videolänge</h2>

<select>

<option>5 Sekunden</option>
<option>10 Sekunden</option>
<option>15 Sekunden</option>
<option>30 Sekunden</option>
<option>60 Sekunden</option>

</select>

</div>


<div class="box">

<h2>Videostil</h2>

<select>

<option>Realistisch</option>
<option>Cinematic</option>
<option>Natur</option>
<option>Fantasy</option>
<option>3D Animation</option>

</select>

</div>


<div class="box">

<button onclick="createPrompt()">
✨ Video erstellen
</button>

<div class="box" id="result" style="display:none;">

<h2>🎬 Dein KI-Video Prompt</h2>

<p id="promptText"></p>
<h2>📖 Storyboard</h2>

<p id="storyboardText"></p>
</div>

</div>


</div>
<script>

function createPrompt(){

let idea = document.querySelector("textarea").value;

let style = document.querySelectorAll("select")[1].value;

let length = document.querySelectorAll("select")[0].value;


let prompt = 
"Create a high quality realistic AI video. " +
"Scene: " + idea + ". " +
"Style: " + style + ". " +
"Duration: " + length + ". " +
"Cinematic camera movement, realistic lighting, detailed environment, smooth motion, 4K quality, professional film look.";


document.getElementById("promptText").innerText = prompt;
let storyboard =
"🎬 SZENE 1 - EINLEITUNG (0-5 Sekunden)\n\n" +
"Bildbeschreibung:\n" +
"Eine detaillierte Eröffnung der Szene mit Umgebung, Licht, Wetter und Atmosphäre. " +
"Die Hauptfigur wird vorgestellt und die Welt wird filmisch aufgebaut.\n\n" +
"Kamera:\n" +
"Cinematic establishing shot, langsame Kamerabewegung, natürliche Tiefenschärfe, professioneller Filmlook.\n\n" +
"Details:\n" +
"Realistische Texturen, natürliche Bewegungen, hochwertige Beleuchtung, 4K Qualität.\n\n\n" +

"🎬 SZENE 2 - HAUPTAKTION (5-10 Sekunden)\n\n" +
"Bildbeschreibung:\n" +
"Die Hauptfigur führt die zentrale Handlung aus. Emotionen, Bewegungen und Umgebung werden detailliert dargestellt.\n\n" +
"Kamera:\n" +
"Nahaufnahmen, dynamische Kamerafahrt, sanfte Übergänge, emotionale Perspektive.\n\n" +
"Details:\n" +
"Realistische Bewegungen, detaillierte Umgebung, natürliche Physik, filmische Atmosphäre.\n\n\n" +

"🎬 SZENE 3 - FINALE (10-15 Sekunden)\n\n" +
"Bildbeschreibung:\n" +
"Eine beeindruckende Abschlussaufnahme mit emotionalem Höhepunkt und schöner visueller Komposition.\n\n" +
"Kamera:\n" +
"Weite Filmaufnahme, langsames Herauszoomen, epischer Abschluss.\n\n" +
"Details:\n" +
"Perfekte Beleuchtung, hochwertige Animation, realistischer Kino-Stil.";

document.getElementById("storyboardText").innerText = storyboard;
document.getElementById("result").style.display="block";

}

</script>
</body>

</html>
