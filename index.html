<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flow AI Studio</title>


<style>

body {
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}


.container {
    max-width:900px;
    margin:auto;
    padding:40px;
}


h1 {
    text-align:center;
    color:#a78bfa;
    font-size:42px;
}


.box {

    background:#1f2937;
    padding:25px;
    border-radius:20px;
    margin-top:20px;

}


textarea {

    width:100%;
    height:120px;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:16px;
    box-sizing:border-box;

}


select {

    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:16px;

}



button {

    width:100%;
    padding:18px;
    background:#8b5cf6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;

}



button:hover {

    background:#7c3aed;

}



.result {

    display:none;

}


</style>


</head>


<body>


<div class="container">


<h1>🎬 Flow AI Studio</h1>

<p style="text-align:center;">
KI Video Planung für YouTube, Instagram & mehr
</p>



<div class="box">

<h2>🎥 Deine Video-Idee</h2>

<textarea id="idea"
placeholder="Beispiel: Ein realistischer Wolf läuft durch einen verschneiten Wald"></textarea>

</div>



<div class="box">

<h2>⏱ Videolänge</h2>

<select id="length">

<option>5 Sekunden</option>
<option>10 Sekunden</option>
<option>15 Sekunden</option>
<option>30 Sekunden</option>
<option>60 Sekunden</option>

</select>

</div>



<div class="box">

<h2>🎨 Stil</h2>

<select id="style">

<option>Realistisch</option>
<option>Cinematic</option>
<option>3D Animation</option>
<option>Fantasy</option>
<option>Dokumentation</option>

</select>

</div>



<div class="box">

<button onclick="createVideoPlan()">

✨ Video erstellen

</button>

</div>





<div class="box result" id="result">


<h2>🎬 KI Video Prompt</h2>

<p id="promptText"></p>


<h2>📖 Storyboard</h2>

<p id="storyboardText"></p>


<h2>👤 Charakter Analyse</h2>

<p id="characterText"></p>


<h2>🎥 Kamera & Regie</h2>

<p id="cameraText"></p>


<h2>🌅 Atmosphäre & Umgebung</h2>

<p id="environmentText"></p>



</div>



</div>





<script>


function createVideoPlan(){



let idea = document.getElementById("idea").value;

let length = document.getElementById("length").value;

let style = document.getElementById("style").value;



if(idea.trim()==""){

alert("Bitte zuerst eine Video-Idee eingeben!");

return;

}





let prompt =

"Create a professional AI generated video.\n\n" +

"Scene:\n" + idea + "\n\n" +

"Style: " + style + "\n" +

"Duration: " + length + "\n\n" +

"Cinematic camera movement, realistic lighting, detailed environment, smooth animation, 4K quality, professional film look.";





document.getElementById("promptText").innerText = prompt;





let storyboard =


"🎬 SZENE 1 - EINLEITUNG (0-5 Sekunden)\n\n" +

"Die Welt und die Hauptfigur werden filmisch vorgestellt.\n" +

"Zeige Umgebung, Farben, Licht und Atmosphäre detailliert.\n\n" +

"Kamera: Langsame Cinematic Kamerafahrt mit Tiefenschärfe.\n\n\n" +


"🎬 SZENE 2 - HAUPTAKTION (5-10 Sekunden)\n\n" +

"Die wichtigste Handlung passiert. Emotionen, Bewegungen und Details stehen im Mittelpunkt.\n\n" +

"Kamera: Dynamische Bewegung und emotionale Nahaufnahmen.\n\n\n" +


"🎬 SZENE 3 - FINALE (10-15 Sekunden)\n\n" +

"Eine beeindruckende Abschlussaufnahme mit emotionaler Wirkung.\n\n" +

"Kamera: Weite Filmaufnahme mit langsamem Zoom heraus.";





document.getElementById("storyboardText").innerText = storyboard;






let character =


"👤 HAUPTFIGUR:\n" +

idea + "\n\n" +

"🎨 AUSSEHEN:\n" +

"Detailliertes Charakterdesign mit Farben, Körperform, Gesicht, Kleidung oder besonderen Merkmalen.\n\n" +

"✨ PERSÖNLICHKEIT:\n" +

"Eigenschaften, Emotionen und Verhalten der Figur.\n\n" +

"🎬 ANIMATION:\n" +

"Natürliche Bewegungen, Körpersprache und realistische Gesichtsausdrücke.";





document.getElementById("characterText").innerText = character;






let camera =


"🎥 KAMERA:\n" +

"Cinematic Kamera wie bei einem professionellen Film.\n\n" +

"📹 BEWEGUNG:\n" +

"Tracking Shots, langsame Kamerafahrten, Zooms und flüssige Bewegungen.\n\n" +

"🔎 PERSPEKTIVE:\n" +

"Tiefenschärfe, hochwertige Bildkomposition und emotionale Perspektiven.\n\n" +

"🎬 FILMSTIL:\n" +

"Hollywood-Kinostil, 4K, professionelle Videoproduktion.";





document.getElementById("cameraText").innerText = camera;






let environment =


"🌅 UMGEBUNG:\n" +

"Erstelle eine detaillierte Welt passend zur Geschichte mit Landschaft, Wetter, Architektur und kleinen visuellen Details.\n\n" +

"💡 LICHT:\n" +

"Realistische Beleuchtung, natürliche Schatten und filmische Farben.\n\n" +

"✨ ATMOSPHÄRE:\n" +

"Emotionale Stimmung passend zur Geschichte.\n\n" +

"🔍 DETAILS:\n" +

"Realistische Texturen, kleine Bewegungen und hochwertige 4K Filmqualität.";





document.getElementById("environmentText").innerText = environment;






document.getElementById("result").style.display="block";



}



</script>


</body>

</html>
