<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flow AI Studio</title>

<style>

body {
    background:#111827;
    color:white;
    font-family:Arial, sans-serif;
    margin:0;
}

.container {
    max-width:900px;
    margin:auto;
    padding:40px;
}

h1 {
    text-align:center;
    color:#a78bfa;
    font-size:42px;
}

.box {
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
}

textarea {
    width:100%;
    height:120px;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:16px;
    box-sizing:border-box;
}

select {
    width:100%;
    padding:15px;
    border-radius:10px;
    border:none;
    font-size:16px;
}

button {

    width:100%;
    padding:18px;
    margin-top:10px;
    background:#8b5cf6;
    color:white;
    border:none;
    border-radius:15px;
    font-size:18px;
    cursor:pointer;

}

button:hover {
    background:#7c3aed;
}


.result {

    display:none;

}


</style>

</head>


<body>


<div class="container">


<h1>🎬 Flow AI Studio</h1>

<p style="text-align:center;">
Erstelle professionelle KI-Video Konzepte
</p>



<div class="box">

<h2>🎥 Deine Video-Idee</h2>

<textarea id="idea"
placeholder="Beispiel: Ein kleiner Panda entdeckt einen magischen Wald"></textarea>

</div>




<div class="box">

<h2>⏱ Videolänge</h2>

<select id="length">

<option>5 Sekunden</option>
<option>10 Sekunden</option>
<option>15 Sekunden</option>
<option>30 Sekunden</option>
<option>60 Sekunden</option>

</select>

</div>





<div class="box">

<h2>🎨 Stil</h2>

<select id="style">

<option>Realistisch</option>
<option>Cinematic</option>
<option>3D Animation</option>
<option>Fantasy</option>
<option>Natur Dokumentation</option>

</select>

</div>





<div class="box">

<button onclick="createVideoPlan()">

✨ Video erstellen

</button>

</div>





<div class="box result" id="result">


<h2>🎬 KI Video Prompt</h2>

<p id="promptText"></p>



<h2>📖 Storyboard</h2>

<p id="storyboardText"></p>



<h2>👤 Charakter Analyse</h2>
<h2>🎥 Kamera & Regie</h2>
<h2>🌅 Atmosphäre & Umgebung</h2>

<p id="environmentText"></p>
<p id="cameraText"></p>
<p id="characterText"></p>



</div>




</div>




<script>


function createVideoPlan(){


let idea = document.getElementById("idea").value;

let length = document.getElementById("length").value;

let style = document.getElementById("style").value;



if(idea.trim() === ""){

alert("Bitte zuerst eine Video-Idee eingeben!");

return;

}



let prompt =

"Create a high quality AI generated video.\n\n" +

"Scene: " + idea + "\n\n" +

"Style: " + style + "\n" +

"Duration: " + length + "\n\n" +

"Professional cinematic camera movement, realistic lighting, detailed environment, smooth animation, 4K quality, high detail, professional film look.";




document.getElementById("promptText").innerText = prompt;





let storyboard =


"🎬 SZENE 1 - EINLEITUNG\n\n" +

"Die Geschichte beginnt mit einer filmischen Einführung. " +

"Die Umgebung wird detailliert gezeigt. " +

"Beschreibe Landschaft, Farben, Licht, Wetter und Atmosphäre passend zur Idee:\n\n" +

idea + "\n\n" +


"Kamera: Langsame Cinematic Kamerafahrt, weiche Bewegungen, Tiefenschärfe.\n\n\n" +



"🎬 SZENE 2 - HAUPTAKTION\n\n" +

"Die Hauptfigur erlebt den wichtigsten Moment der Geschichte. " +

"Emotionen, Bewegungen und Interaktionen werden sichtbar dargestellt.\n\n" +

"Kamera: Nahaufnahmen, dynamische Bewegung, professionelle Filmaufnahme.\n\n\n" +



"🎬 SZENE 3 - FINALE\n\n" +

"Die Geschichte endet mit einer beeindruckenden Abschlussaufnahme. " +

"Warme Atmosphäre, emotionale Szene, hochwertiger Kino-Look.\n\n" +

"Kamera: Weite Aufnahme, langsames Herauszoomen, epischer Abschluss.";





document.getElementById("storyboardText").innerText = storyboard;






let character =


"👤 HAUPTFIGUR:\n" +

idea + "\n\n" +


"🎨 AUSSEHEN:\n" +

"Erstelle ein detailliertes Charakterdesign mit Farben, Körperform, Gesicht, Kleidung oder besonderen Merkmalen.\n\n" +


"✨ PERSÖNLICHKEIT:\n" +

"Die Figur besitzt klare Eigenschaften, Emotionen und eine einzigartige Persönlichkeit.\n\n" +


"🎬 ANIMATION:\n" +

"Natürliche Bewegungen, realistische Körpersprache und emotionale Gesichtsausdrücke.";





document.getElementById("characterText").innerText = character;
let camera =

"🎥 KAMERA:\n" +

"Cinematic professional camera setup.\n\n" +

"📹 BEWEGUNG:\n" +

"Langsame Kamerafahrt, flüssige Bewegungen, stabile Filmaufnahme.\n\n" +

"🔎 PERSPEKTIVE:\n" +

"Filmische Perspektive mit natürlicher Tiefenschärfe und emotionaler Bildkomposition.\n\n" +

"💡 LICHT:\n" +

"Realistische Beleuchtung passend zur Szene, weiche Schatten, hochwertige Farben.\n\n" +

"🎬 FILMSTIL:\n" +

"Hollywood-Kinostil, 4K Qualität, professionelle Videoproduktion.";


document.getElementById("cameraText").innerText = camera;
let environment =

"🌅 UMGEBUNG:\n" +

"Erstelle eine detaillierte Welt passend zur Geschichte. " +
"Beschreibe Landschaft, Architektur, Natur, Wetter und kleine visuelle Details.\n\n" +

"💡 LICHT:\n" +

"Cinematic Beleuchtung, natürliche Lichtquellen, realistische Schatten, hochwertige Farben und Filmstimmung.\n\n" +

"✨ ATMOSPHÄRE:\n" +

"Emotionale Stimmung passend zur Szene. " +
"Magisch, beeindruckend und visuell ansprechend.\n\n" +

"🔍 DETAILS:\n" +

"Realistische Texturen, kleine Umgebungsbewegungen, hochwertige 4K Filmqualität.";


document.getElementById("environmentText").innerText = environment;


document.getElementById("result").style.display="block";



}


</script>



</body>

</html>
