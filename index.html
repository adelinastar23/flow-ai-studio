<!DOCTYPE html>
<html lang="de">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Flow AI Studio</title>

<style>

body {
    margin:0;
    font-family:Arial, sans-serif;
    background:#111827;
    color:white;
}

.container {
    max-width:900px;
    margin:auto;
    padding:40px;
}

h1 {
    text-align:center;
    color:#a78bfa;
    font-size:45px;
}

.card {
    background:#1f2937;
    padding:25px;
    border-radius:20px;
    margin-top:20px;
}

textarea,
select {

    width:100%;
    padding:15px;
    margin-top:10px;
    border-radius:10px;
    border:none;
    font-size:16px;

}

button {

    width:100%;
    padding:18px;
    margin-top:20px;
    border:none;
    border-radius:15px;
    background:#8b5cf6;
    color:white;
    font-size:18px;
    cursor:pointer;

}

.preview {

    height:200px;
    background:#030712;
    border-radius:20px;
    display:flex;
    align-items:center;
    justify-content:center;
    color:#9ca3af;

}

</style>

</head>


<body>


<div class="container">


<h1>🎬 Flow AI Studio</h1>


<div class="card">

<h2>Beschreibe dein Video</h2>

<textarea rows="5" placeholder="Beispiel: Ein realistischer Wolf läuft durch einen verschneiten Wald"></textarea>

</div>



<div class="card">

<h2>Videolänge</h2>

<select>

<option>5 Sekunden</option>
<option>10 Sekunden</option>
<option>15 Sekunden</option>
<option>30 Sekunden</option>
<option>60 Sekunden</option>

</select>

</div>



<div class="card">

<h2>Stil</h2>

<select>

<option>Realistisch</option>
<option>Cinematic</option>
<option>Natur</option>
<option>Fantasy</option>
<option>Animation</option>

</select>

</div>



<div class="card">

<button>

✨ Video erstellen

</button>

</div>



<div class="card">

<h2>Vorschau</h2>

<div class="preview">

Deine Videovorschau

</div>

</div>



</div>


</body>

</html>
